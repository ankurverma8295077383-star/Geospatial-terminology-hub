<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spatial Tech Glossary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="layout-wrapper">
        <aside class="sidebar">
            <h2>Technologies</h2>
            <div id="categoryPanel"></div>
        </aside>

        <main class="main-content">
            <div class="header">
                <h1>Spatial Tech Glossary</h1>
                <div class="search-profile-wrapper">
                    <input type="text" id="searchInput" onkeyup="searchGlossary()" placeholder="Search terminology...">
                    <div class="user-profile">
                        <img src="ankur-sir.jpg" alt="Profile Image">
                        <span>Ankur Verma</span>
                    </div>
                </div>
            </div>
            <div class="grid-container" id="glossaryGrid"></div>
        </main>
    </div>


<!-- Modal Overlay -->
    <div id="cardModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeModal(event)">&times;</span>
            
            <div class="modal-split-layout">
                <!-- Left Side: Text -->
                <div class="modal-text-side">
                    <h2 id="modalTerm"></h2>
                    <p id="modalDefinition"></p>
                </div>
                
                <!-- Right Side: Image -->
                <div class="modal-image-side">
                    <img id="modalImage" src="" alt="Technology Image">
                </div>
            </div>
            
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
